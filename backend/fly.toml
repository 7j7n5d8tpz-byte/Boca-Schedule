# fly.toml app configuration file generated for boca-backend on 2026-05-29T15:30:54+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'boca-backend'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3001'
  # Public URL of the Julia optimizer (boca-julia app). Non-secret; set here so
  # prod optimization always resolves even without a Fly secret. A secret of the
  # same name, if set, overrides this.
  JULIA_URL = 'https://boca-julia.fly.dev'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
