name: Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── 1. Frontend unit tests ──────────────────────────────────────────────────
  test-frontend:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm', cache-dependency-path: package-lock.json }
      - run: npm ci
        working-directory: .
      - run: npm test
        working-directory: frontend

  # ── 2. Backend integration tests ───────────────────────────────────────────
  test-backend:
    name: Backend integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm', cache-dependency-path: package-lock.json }

      - uses: supabase/setup-cli@v1
        with: { version: latest }

      - name: Start local Supabase
        run: supabase start --exclude edge-runtime,studio,imgproxy

      - name: Write test .env
        run: |
          STATUS=$(supabase status 2>&1 || true)
          # New Supabase CLI table format: "│ Project URL │ http://... │"
          # and "│ Publishable │ sb_publishable_... │" / "│ Secret │ sb_secret_... │"
          API_URL=$(echo "$STATUS"    | grep "Project URL" | sed 's/.*│ Project URL *│ *//;s/ *│.*//')
          SERVICE_KEY=$(echo "$STATUS" | grep "│ Secret "   | sed 's/.*│ Secret *│ *//;s/ *│.*//')
          ANON_KEY=$(echo "$STATUS"    | grep "Publishable" | sed 's/.*│ Publishable *│ *//;s/ *│.*//')
          {
            echo "SUPABASE_URL=${API_URL:-http://127.0.0.1:54321}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_KEY}"
            echo "SUPABASE_ANON_KEY=${ANON_KEY}"
            echo "JWT_SECRET=test-secret"
            echo "FRONTEND_URL=http://localhost:5173"
            echo "JULIA_URL=http://localhost:3002"
          } > backend/.env

      - run: npm ci

      - name: Run backend tests
        run: npm test
        working-directory: backend

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # ── 3. E2E tests (only on push, not on PRs) ────────────────────────────────
  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm', cache-dependency-path: package-lock.json }

      - uses: supabase/setup-cli@v1
        with: { version: latest }

      - name: Start Supabase
        run: supabase start --exclude edge-runtime,studio,imgproxy

      - name: Extract Supabase credentials
        run: |
          STATUS=$(supabase status 2>&1 || true)
          echo "SUPABASE_URL=$(echo "$STATUS"    | grep "Project URL" | sed 's/.*│ Project URL *│ *//;s/ *│.*//')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | grep "│ Secret "   | sed 's/.*│ Secret *│ *//;s/ *│.*//')" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(echo "$STATUS" | grep "│ Publishable " | sed 's/.*│ Publishable *│ *//;s/ *│.*//')" >> $GITHUB_ENV

      - run: npm ci

      - name: Start backend
        working-directory: backend
        run: |
          npm run build
          npm start &
          for i in {1..20}; do curl -sf http://localhost:3001/health && break; sleep 1; done
          # Fail the step (instead of silently continuing) if the backend never came up
          curl -sf http://localhost:3001/health
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          JWT_SECRET: test-secret
          NODE_ENV: test
          FRONTEND_URL: http://localhost:5173
          JULIA_URL: http://localhost:3002
          PORT: 3001

      - name: Build and serve frontend
        working-directory: frontend
        run: |
          VITE_API_URL=http://localhost:3001 npm run build
          npx serve -s dist -p 5173 &
          for i in {1..20}; do curl -sf http://localhost:5173 && break; sleep 1; done

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Seed E2E test users
        run: node scripts/seed-e2e-users.mjs
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          E2E_PLAYER_EMAIL: e2e-player@bocatest.internal
          E2E_PLAYER_PASSWORD: Test123!
          E2E_COACH_EMAIL: e2e-coach@bocatest.internal
          E2E_COACH_PASSWORD: Test123!
          E2E_ADMIN_EMAIL: e2e-admin@bocatest.internal
          E2E_ADMIN_PASSWORD: Test123!

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # ── 4. Deploy (only after all tests pass, only on main) ────────────────────
  migrate:
    name: Supabase migrations
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: latest }
      # `db push` no longer accepts --project-ref; link to the project first,
      # then push. Both read the DB password from SUPABASE_DB_PASSWORD.
      - run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy-backend:
    name: Deploy backend to Fly.io
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --config backend/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-julia:
    name: Deploy Julia optimizer to Fly.io
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Fly.io registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # Build on GitHub's native x86_64 Linux — PackageCompiler works here,
      # unlike cross-compilation from Apple Silicon where QEMU causes segfaults.
      - name: Build and push Julia sysimage image
        uses: docker/build-push-action@v5
        with:
          context: optimization-service
          push: true
          tags: registry.fly.io/boca-julia:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy from pre-built image
        run: flyctl deploy --image registry.fly.io/boca-julia:latest --app boca-julia
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
