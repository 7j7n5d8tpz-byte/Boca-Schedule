name: Reminders

# Sends reminder emails/notifications by calling the backend cron endpoints.
# Runs hourly; each endpoint itself decides which matches are due (and only
# reminds each once), so the coarse schedule is fine. signup-reminders works
# off a rolling window; daily-reminders only acts at 18:00 Europe/Copenhagen.
on:
  schedule:
    - cron: '0 * * * *' # every hour, on the hour (UTC)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  signup-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger signup reminders
        run: |
          code=$(curl -s -o /tmp/body -w '%{http_code}' -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            https://boca-backend.fly.dev/api/cron/signup-reminders)
          echo "HTTP $code"; cat /tmp/body; echo
          # Fail the run on server/auth errors so problems are visible in Actions.
          if [ "$code" -ge 400 ]; then exit 1; fi

      - name: Trigger daily reminders (match-day / pick-squad / record-result)
        run: |
          code=$(curl -s -o /tmp/body -w '%{http_code}' -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            https://boca-backend.fly.dev/api/cron/daily-reminders)
          echo "HTTP $code"; cat /tmp/body; echo
          if [ "$code" -ge 400 ]; then exit 1; fi
