<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/boca-logo.png" />
    <!-- viewport-fit=cover lets the page paint into the iOS safe areas so the
         page background reaches the screen edges (otherwise the home-indicator
         strip stayed browser-white). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Mobile Safari tints the chrome it overlaps — the status-bar region at
         the top and the toolbar region at the bottom — with theme-color (content
         flows under both; with none set Safari defaults the top dark and it
         sticks). Pin it to the page grey so both regions blend into the content
         and it scrolls edge-to-edge with no framing bars, top or bottom. -->
    <meta name="theme-color" content="#f9fafb" />
    <title>Boca Boldisch</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
